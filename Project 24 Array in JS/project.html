<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>    
    <body>
        <h2>JavaScript Objects Data Structure and Array</h2>
        <script>
            var student = {
                name: 'Amitt',
                age: '12',
                Grade: '7',
                hobbies: 'Playing Games',
                fav_sport: 'Cricket'
            };
            var color = ["white", "black", "red", "green", "blue"];
            document.write("Student name is : " + student.name,
                    "<br>", "Student favorite sport is : "
                + student.fav_sport);
                document.write("<br>Before Poping the colors are: " + color.join("^"));
                document.write("<br>My favorite color is : " + color[3]);
                color.pop();
                    document.write("<br>After Poping the colors are : " + color.join("*"));
                    </script>
</body>
</html>
