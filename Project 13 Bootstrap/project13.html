<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <style type="text/css">
        h1{
            color: lime;
        }
        #xyz, #efg{
            color: yellow;
            background: orange;
            font-size: 20px;
        }
        #qwerty, #mnop{
            color: lightblue;
            background: blue;
            font-size: 20px;
        }
        #stuv, #qrs{
            color: burlywood;
            background: chocolate;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="container-abc">
        <h1>Unequel Area Grids</h1>
        <div class="row">
            <div id="xyz" class="col-sm-3">Adding 1-3 grids</div>
            <div id="qwerty" class="col-sm-4">Adding 4-7 grids</div>
            <div id="stuv" class="col-sm-5">Adding 8-12 grids</div>
        </div>
        <div class="row">
            <div id="efg" class="col-sm-2">Adding 1-2 grids</div>
            <div id="mnop" class="col-sm-6">Adding 3-8 grids</div>
            <div id="qrs" class="col-sm-6">Adding 9-12 grids</div>
        </div>
    </div>
</body>
</html>
